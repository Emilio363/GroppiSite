<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroppiSite — Dettaglio campo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <p><a href="index.html">&larr; Tutti i campi</a></p>

    <div id="message"></div>

    <section id="field-info"></section>

    <section id="booking-section" hidden>
      <div class="toolbar">
        <div class="field" style="margin:0;">
          <label for="date">Data</label>
          <input id="date" type="date">
        </div>
      </div>

      <div class="grid" style="grid-template-columns: 1fr 1fr; align-items:start;">
        <div>
          <h2 style="font-size:1.1rem;">Prenotazioni della giornata</h2>
          <div id="bookings"></div>
        </div>
        <div>
          <h2 style="font-size:1.1rem;">Prenota uno slot</h2>
          <div id="book-form"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/field.js"></script>
</body>
</html>
